<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You&rsquo;re on the list — Clarity</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #111827;
      --muted:  #6b7280;
      --border: #e5e7eb;
      --bg:     #ffffff;
      --accent: #2563eb;
      --green:  #16a34a;
      --max:    680px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.75rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.0625rem;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.65;
    }

    a {
      font-size: 0.9375rem;
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="check">&#10003;</div>
  <h1>You&rsquo;re on the list.</h1>
  <p>Thanks for signing up for early access to Clarity. We&rsquo;ll reach out as soon as a spot opens up.</p>
  <a href="index.html">&larr; Back to the site</a>

</body>
</html>
