<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You&rsquo;re on the list — Money in Plain English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #2D2D2D;
      --muted:  #6b7280;
      --border: #DCE8E1;
      --bg:     #ffffff;
      --accent: #5A9171;
      --green:  #5A9171;
      --max:    680px;
    }

    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    h1 { font-family: 'Nunito', sans-serif; }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #F2F7F4;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.75rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.0625rem;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.65;
    }

    a {
      font-size: 0.9375rem;
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="check">&#10003;</div>
  <h1>You&rsquo;re on the list.</h1>
  <p>Thanks for signing up for early access to Money in Plain English. We&rsquo;ll reach out as soon as a spot opens up.</p>
  <a href="index.html">&larr; Back to the site</a>

</body>
</html>
